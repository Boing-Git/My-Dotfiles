general {
    lock_cmd = env QT_SCALE_FACTOR=1.5 quickshell -c lock       # command to run when locking
    before_sleep_cmd = env QT_SCALE_FACTOR=1.5 quickshell -c lock # lock before sleep
    after_sleep_cmd = hyprctl dispatch dpms on # to avoid having to press a key twice to turn on the display
}

listener {
    timeout = 300                       # 5 minutes
    on-timeout = env QT_SCALE_FACTOR=1.5 quickshell -c lock     # lock screen when timeout has passed
}

listener {
    timeout = 330                       # 5.5 minutes
    on-timeout = hyprctl dispatch dpms off # screen off when timeout has passed
    on-resume = hyprctl dispatch dpms on   # screen on when activity is detected after timeout has fired
}
